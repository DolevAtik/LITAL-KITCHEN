<head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>המטבח של ליטל - תפריט אוכל ביתי</title>

        <meta name="description"
            content="המטבח של ליטל - אוכל ביתי איכותי 🍲 משלוחים ואיסוף עצמי. תפריט עשיר ומנות טריות כל יום!">
        <meta name="keywords" content="אוכל ביתי, משלוחים, קוסקוס, שניצל, המטבח של ליטל">
        <meta name="author" content="המטבח של ליטל">

        <!-- Open Graph (WhatsApp / Facebook) -->
        <meta property="og:title" content="המטבח של ליטל - אוכל ביתי">
        <meta property="og:description" content="תפריט אוכל ביתי 🍲 משלוחים ואיסוף עצמי.">
        <meta property="og:image" content="https://lital-kitchen.vercel.app/logo1.jpeg">
        <meta property="og:url" content="https://lital-kitchen.vercel.app">
        <meta property="og:type" content="website">

        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="המטבח של ליטל">
        <meta name="twitter:description" content="אוכל ביתי טרי כל יום 🍲">
        <meta name="twitter:image" content="https://lital-kitchen.vercel.app/logo1.jpeg">

        <!-- Favicon -->
        <link rel="icon" href="/logo1.jpeg">

        <!-- Font + CSS -->
        <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>

<body>
    <header class="header">
        <div class="header-content">
            <img src="logo1.jpeg" alt="המטבח של ליטל" class="logo" id="main-logo"
                onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><text y=\'50\' font-size=\'14\'>לוגו חסר</text></svg>'">
            <h1>אוכל ביתי איכותי בעבודת יד</h1>


        </div>
    </header>

    <div class="special-deal-banner">
        <div class="banner-content">
            <span class="banner-icon">🎉</span>
            <strong>מבצע מיוחד!</strong>
            <span>6 סלטים של 250 מ"ל ב-100 ₪ בלבד</span>
        </div>
    </div>

    <!-- Category Tabs -->
    <nav id="category-tabs" class="category-tabs"></nav>

    <!-- Menu injected dynamically here -->
    <main id="menu-container" class="menu-container"></main>

    <div class="menu-footer-spacer"></div>

    <!-- Sticky Cart Summary -->
    <div id="cart-summary" class="cart-summary hidden">
        <div class="cart-summary-inner">
            <div class="cart-totals">
                <span class="cart-total-label">סה"כ:</span>
                <span id="cart-total-price" class="cart-total-amount">₪0</span>
                <span id="cart-count" class="cart-badge">0</span>
            </div>
            <button id="view-cart-btn" class="btn btn-primary">
                הצג עגלה
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- Customization Modal -->
    <div id="customization-modal" class="modal hidden">
        <div class="modal-content customization-modal-content">
            <div class="modal-header">
                <h2 id="custom-item-name">התאמה אישית</h2>
                <button id="close-customization" class="close-modal">&times;</button>
            </div>
            <div class="modal-body p-1-5">
                <p class="customization-subtitle">מה להוריד מהמנה?</p>
                <div id="customization-options-container" class="customization-options">
                    <!-- Options injected here -->
                </div>
                <!-- Manual Notes Restored -->
                <div class="customization-notes-container" style="margin-top: 1.5rem;">
                    <label for="custom-item-notes" class="customization-subtitle">הערות נוספות/שם למנה (לא
                        חובה):</label>
                    <textarea id="custom-item-notes" class="custom-notes-input" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer p-1-5">
                <div class="modal-footer-btns">
                    <button id="cancel-customization" class="btn btn-secondary">ביטול</button>
                    <button id="add-customized-btn" class="btn btn-primary">הוסף לעגלה</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Modal Overlay -->
    <div id="cart-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>העגלה שלך</h2>
                <button id="close-cart" class="close-modal">&times;</button>
            </div>

            <div id="cart-items" class="cart-items">
                <!-- Items injected here -->
            </div>

            <div id="cart-empty-message" class="cart-empty">
                העגלה שלך ריקה כרגע.
            </div>

            <div id="order-form-container" class="order-form-container hidden">
                <div class="discount-alert hidden" id="discount-alert">
                    <span class="icon">✨</span>
                    <span id="discount-text"></span>
                </div>

                <div class="form-group">
                    <label for="order-date">תאריך איסוף/משלוח:</label>
                    <input type="date" id="order-date" required>
                </div>

                <div class="form-group">
                    <label>סוג הזמנה:</label>
                    <div class="radio-group radio-group-col">
                        <label class="radio-label">
                            <input type="radio" name="delivery" value="איסוף עצמי (הרב חיים חורי 11, לוד)" checked>
                            <span class="radio-text">איסוף עצמי (הרב חיים חורי 11, לוד)</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="delivery" value="משלוח בתיאום מראש">
                            <span class="radio-text">משלוח (בתיאום מראש)</span>
                        </label>
                    </div>
                </div>

                <div class="cart-total-final">
                    <span>סה"כ לתשלום:</span>
                    <strong id="modal-total-price">₪0</strong>
                </div>

                <button id="checkout-btn" class="btn btn-whatsapp">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none">
                        <path
                            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                        </path>
                    </svg>
                    שלח הזמנה בוואטסאפ
                </button>
            </div>
        </div>
    </div>

    <div class="footer-links">
        <a href="https://www.facebook.com/hmtbh.sl.lytl?locale=he_IL" target="_blank" class="social-link facebook">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>

        <a href="https://www.instagram.com/litalatik?igsh=b25xcWRrYXlwMTho" target="_blank"
            class="social-link instagram">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>

        </a>
        <a href="https://wa.me/972548082606" target="_blank" class="social-link whatsapp-icon">

                <path
                    d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                </path>
            </svg>
        </a>
        <a href="tel:0548082606" class="social-link phone-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                <path
                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">

        <p>© כל הזכויות שמורות. האתר נבנה ע"י
            <a href="https://www.linkedin.com/in/dolev-atik/" target="_blank" class="dev-link">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path
                        d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                </svg>
                <span>דולב עתיק</span>

    </div>
    </footer>
