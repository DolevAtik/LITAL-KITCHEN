<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המטבח של ליטל - תפריט אוכל ביתי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="המטבח של ליטל - אוכל ביתי איכותי. משלוחים ואיסוף עצמי.">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <img src="logo.jpg" alt="המטבח של ליטל" class="logo" id="main-logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><text y=\'50\' font-size=\'14\'>לוגו חסר</text></svg>'">
            <h1>המטבח של ליטל</h1>
            <p class="subtitle">אוכל ביתי איכותי</p>
            <p class="description">מטבח ביתי הכל בעבודת יד</p>
        </div>
    </header>

    <div class="special-deal-banner">
        <div class="banner-content">
            <span class="banner-icon">🎉</span>
            <strong>מבצע מיוחד!</strong>
            <span>6 סלטים של 250 מ"ל ב-100 ₪ בלבד</span>
        </div>
    </div>

    <!-- Category Tabs -->
    <nav id="category-tabs" class="category-tabs"></nav>

    <!-- Menu injected dynamically here -->
    <main id="menu-container" class="menu-container"></main>

    <div class="menu-footer-spacer"></div>

    <!-- Sticky Cart Summary -->
    <div id="cart-summary" class="cart-summary hidden">
        <div class="cart-summary-inner">
            <div class="cart-totals">
                <span class="cart-total-label">סה"כ:</span>
                <span id="cart-total-price" class="cart-total-amount">₪0</span>
                <span id="cart-count" class="cart-badge">0</span>
            </div>
            <button id="view-cart-btn" class="btn btn-primary">
                הצג עגלה
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            </button>
        </div>
    </div>

    <!-- Cart Modal Overlay -->
    <div id="cart-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>העגלה שלך</h2>
                <button id="close-cart" class="close-modal">&times;</button>
            </div>
            
            <div id="cart-items" class="cart-items">
                <!-- Items injected here -->
            </div>
            
            <div id="cart-empty-message" class="cart-empty">
                העגלה שלך ריקה כרגע.
            </div>

            <div id="order-form-container" class="order-form-container hidden">
                <div class="discount-alert hidden" id="discount-alert">
                    <span class="icon">✨</span>
                    <span id="discount-text"></span>
                </div>

                <div class="form-group">
                    <label for="order-date">תאריך איסוף/משלוח:</label>
                    <input type="date" id="order-date" required>
                </div>
                
                <div class="form-group">
                    <label>סוג הזמנה:</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="delivery" value="איסוף עצמי" checked>
                            <span class="radio-text">איסוף עצמי</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="delivery" value="משלוח">
                            <span class="radio-text">משלוח</span>
                        </label>
                    </div>
                </div>

                <div class="cart-total-final">
                    <span>סה"כ לתשלום:</span>
                    <strong id="modal-total-price">₪0</strong>
                </div>

                <button id="checkout-btn" class="btn btn-whatsapp">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    שלח הזמנה בוואטסאפ
                </button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="https://www.instagram.com/litalatik?igsh=b25xcWRrYXlwMTho" target="_blank" class="social-link instagram">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
            </a>
            <a href="https://wa.me/972548082606" target="_blank" class="social-link whatsapp-icon">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            </a>
        </div>
        <div class="phone-number">054-808-2606</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
